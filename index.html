<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>기자 유형 테스트</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #ffffff;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 40px 20px;
  text-align: center;
}

.title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 40px;
}

.subtitle {
  color: #777;
  margin-bottom: 30px;
}

.question {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 30px;
  line-height: 1.4;
}

.btn {
  display: block;
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  border-radius: 14px;
  border: 1px solid #e5e5e5;
  background: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn:hover {
  background: #f8f8f8;
}

.btn:active {
  transform: scale(0.98);
}

.progress {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 15px;
}

.start-btn {
  padding: 16px;
  border-radius: 14px;
  background: #000;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
}

.result-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 15px;
}

.fade {
  animation: fade 0.3s ease;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">기자 유형 테스트</div>

  <div id="start">
    <div class="subtitle">당신의 취재 스타일을 알아보세요</div>
    <div class="start-btn" onclick="start()">테스트 시작하기</div>
  </div>

  <div id="quiz" class="hidden">
    <div class="progress" id="progress"></div>
    <div class="question fade" id="question"></div>
    <div id="answers"></div>
  </div>

  <div id="result" class="hidden"></div>
</div>

<script>
const quiz = [
  {
    q: "새로운 사건을 접했을 때 당신은?",
    a: [
      { text: "자료부터 꼼꼼히 분석한다", type: "A" },
      { text: "현장으로 바로 달려간다", type: "B" }
    ]
  },
  {
    q: "인터뷰를 할 때 더 중요한 것은?",
    a: [
      { text: "정확한 사실 전달", type: "A" },
      { text: "편안한 분위기 조성", type: "B" }
    ]
  },
  {
    q: "기사 작성 스타일은?",
    a: [
      { text: "논리 중심으로 작성", type: "A" },
      { text: "스토리 중심으로 작성", type: "B" }
    ]
  },
  {
    q: "마감이 촉박할 때 당신은?",
    a: [
      { text: "끝까지 검토한다", type: "A" },
      { text: "빠르게 완성한다", type: "B" }
    ]
  },
  {
    q: "더 끌리는 취재 방식은?",
    a: [
      { text: "데이터 분석", type: "A" },
      { text: "현장 취재", type: "B" }
    ]
  }
];

let current = 0;
let score = { A: 0, B: 0 };

function start() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  show();
}

function show() {
  const q = quiz[current];

  document.getElementById("progress").innerText =
    `${current + 1} / ${quiz.length}`;

  const question = document.getElementById("question");
  question.classList.remove("fade");
  void question.offsetWidth;
  question.classList.add("fade");

  question.innerText = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.a.forEach(ans => {
    const btn = document.createElement("div");
    btn.className = "btn fade";
    btn.innerText = ans.text;
    btn.onclick = () => select(ans.type);
    answers.appendChild(btn);
  });
}

function select(type) {
  score[type]++;
  current++;

  if (current < quiz.length) {
    show();
  } else {
    result();
  }
}

function result() {
  document.getElementById("quiz").classList.add("hidden");
  const res = document.getElementById("result");
  res.classList.remove("hidden");

  const type = score.A > score.B ? "분석형 기자 🧠" : "현장형 기자 🎤";

  res.innerHTML = `
    <div class="result-title fade">${type}</div>
    <p class="fade">
      ${type.includes("분석")
        ? "데이터와 논리를 기반으로 정확한 보도를 하는 스타일입니다."
        : "현장에서 생생한 이야기를 전달하는 감각적인 기자입니다."}
    </p>
    <div class="start-btn fade" onclick="location.reload()">다시하기</div>
  `;
}
</script>

</body>
</html>
